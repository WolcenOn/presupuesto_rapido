<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AntenaManager v9.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="no-print">
        <button class="tab active" onclick="showPanel('p-crear', this)">📝 NUEVO</button>
        <button class="tab" onclick="showPanel('p-tarifas', this)">📚 LISTA</button>
        <button class="tab" onclick="showPanel('p-config', this)">⚙️ CONFIG</button>
    </nav>

    <main class="container">
        
        <section id="p-crear" class="panel active">
            <div class="card no-print">
                <header><h3>Añadir Concepto</h3></header>
                <div class="f-group">
                    <label>Elegir de lista</label>
                    <select id="sel-item" onchange="autoFill()"></select>
                </div>
                <div class="f-group">
                    <label>Descripción</label>
                    <input type="text" id="in-desc" placeholder="Escribir trabajo manual...">
                </div>
                <div class="row">
                    <div class="f-group"><label>Cant.</label><input type="number" id="in-cant" value="1"></div>
                    <div class="f-group"><label>Precio Ud. (€)</label><input type="number" id="in-prec" step="0.01"></div>
                </div>
                <button class="btn btn-main" onclick="addFila()">+ AÑADIR FILA</button>
            </div>

            <article id="hoja-real" class="paper">
                <div class="p-header">
                    <div id="v-logo-box">
                        <img id="v-logo" src="" style="display:none; max-height:60px;">
                        <span id="v-nom-text" style="font-weight:bold; color:#2563eb;">MI EMPRESA</span>
                    </div>
                    <div class="v-empresa-datos" style="text-align:right">
                        <strong id="v-emp">EMPRESA</strong><br>
                        <span id="v-cif">CIF: ---</span><br>
                        <span id="v-tel">TEL: ---</span>
                    </div>
                </div>

                <div class="p-meta">
                    <div><strong>PRESUPUESTO</strong><br><small id="v-ref">REF: --</small></div>
                    <div><small id="v-fec">--/--/--</small></div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Cant</th>
                            <th>Descripción</th>
                            <th>Precio</th>
                            <th>Total</th>
                            <th class="no-print"></th>
                        </tr>
                    </thead>
                    <tbody id="v-body"></tbody>
                </table>

                <div class="p-resumen">
                    <div class="row-res"><span>Base Imponible:</span> <span id="r-base">0.00€</span></div>
                    <div class="row-res"><span>IVA (21%):</span> <span id="r-iva">0.00€</span></div>
                    <div class="row-res total-big"><span>TOTAL:</span> <span id="r-total">0.00€</span></div>
                </div>

                <footer class="p-footer">
                    <p><strong>Notas:</strong> <span id="v-notas" contenteditable="true">Validez: 30 días.</span></p>
                </footer>
            </article>

            <div class="no-print actions">
                <button class="btn btn-alt" onclick="window.print()">🖨️ GENERAR PDF / IMPRIMIR</button>
                <button class="btn btn-danger" onclick="limpiarTab()">🗑️ VACIAR HOJA</button>
            </div>
        </section>

        <section id="p-tarifas" class="panel">
            <div class="card">
                <h3>Añadir a Biblioteca</h3>
                <div class="f-group"><label>Nombre</label><input type="text" id="lib-n"></div>
                <div class="f-group"><label>Precio (€)</label><input type="number" id="lib-p" step="0.01"></div>
                <button class="btn btn-main" onclick="saveLib()">GUARDAR PRODUCTO</button>
            </div>
            <div id="lista-lib"></div>
        </section>

        <section id="p-config" class="panel">
            <div class="card">
                <h3>Mis Datos</h3>
                <div class="f-group"><label>Nombre</label><input type="text" id="c-nom"></div>
                <div class="f-group"><label>CIF</label><input type="text" id="c-cif"></div>
                <div class="f-group"><label>Teléfono</label><input type="text" id="c-tel"></div>
                <div class="f-group"><label>Logo</label><input type="file" onchange="upLogo(this)"></div>
                <button class="btn btn-main" onclick="saveCfg()">ACTUALIZAR DATOS</button>
            </div>
            <div class="card">
                <h3>Exportar Datos para el Jefe</h3>
                <button class="btn btn-alt" onclick="exportJSON()">💾 DESCARGAR COPIA (.json)</button>
                <button class="btn btn-alt" style="margin-top:10px; background:#64748b" onclick="document.getElementById('f-in').click()">📂 CARGAR COPIA</button>
                <input type="file" id="f-in" style="display:none" onchange="importJSON(event)">
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
